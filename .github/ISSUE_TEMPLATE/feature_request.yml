name: Feature request
description: Suggest a new feature or improvement.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Before filing, please check the
        [existing issues](https://github.com/Afro666/notion-ical-bridge/issues?q=is%3Aissue)
        to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing pain point. "I want X" requests are usually weaker than "today I have to do X awkwardly because Y."
      placeholder: |
        Today, when I ..., I have to ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the server (or config, or docs) do instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds that already exist, or other designs you considered.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Roughly, where would this change live?
      options:
        - Notion property extraction (new property type, parsing edge case)
        - iCal output (new field, RFC 5545 compliance, client quirk)
        - Caching / performance
        - Authentication / tokens
        - Configuration / Zod schema
        - HTTP server / routing / landing page
        - Docker / deployment
        - Documentation only
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Are you willing to send a PR?
      options:
        - label: I'd like to implement this myself (read CONTRIBUTING.md first)
        - label: I'd like guidance on where to start
        - label: I'm only filing the request — not planning to send code
