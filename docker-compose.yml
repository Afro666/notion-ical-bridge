services:
  app:
    build: .
    image: notion-ical-bridge:latest
    container_name: notion-ical-bridge
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3000:3000"

    # config.yaml is mounted read-only from the host.
    # Create it from config.example.yaml (lands in Phase 1).
    volumes:
      - ./config.yaml:/app/config.yaml:ro

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
